<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Doctor GPS Admin</title><link rel="stylesheet" href="styles.css"></head>
<body><aside><div class="brand">◆ <span>Doctor GPS</span><small>Админ-панель</small></div><nav><button data-page="dashboard" class="active">Дашборд</button><button data-page="users">Пользователи</button><button data-page="payments">Платежи</button><button data-page="reports">Отчёты</button><button data-page="settings">Настройки</button></nav><button id="logout">Выйти</button></aside>
<main><section id="login" class="login"><div class="panel"><h1>Вход администратора</h1><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Пароль"><button id="loginButton" class="primary">Войти</button><p id="loginError"></p></div></section>
<section id="app" hidden><header><div><h1 id="pageTitle">Дашборд</h1><p>Управление Doctor GPS</p></div><span id="adminEmail"></span></header>
<div id="dashboard" class="page"><div class="metrics"><article><small>Пользователи</small><strong id="usersTotal">0</strong></article><article><small>Активные подписки</small><strong id="activeSubscriptions">0</strong></article><article><small>Пробные периоды</small><strong id="activeTrials">0</strong></article><article><small>Доход за месяц</small><strong id="revenueMonth">0 ₽</strong></article></div><div class="panel"><h2>Последние платежи</h2><div id="recentPayments"></div></div></div>
<div id="users" class="page" hidden><div class="panel"><h2>Подписки пользователей</h2><div id="usersTable"></div></div></div>
<div id="payments" class="page" hidden><div class="panel"><h2>Все платежи</h2><div id="paymentsTable"></div></div></div>
<div id="reports" class="page" hidden><div class="panel"><h2>Отчёты</h2><button id="exportCsv" class="primary">Скачать платежи CSV</button></div></div>
<div id="settings" class="page" hidden><div class="panel form"><h2>Платежи и тариф</h2><label>Активный провайдер<select id="provider"><option value="yookassa">ЮKassa</option><option value="robokassa">Robokassa</option></select></label><label>Цена в месяц, ₽<input id="price" type="number" min="1" step="1"></label><label>Бесплатный период, дней<input id="trialDays" type="number" min="0" max="90"></label><label class="toggle"><input id="paymentsEnabled" type="checkbox"> Приём платежей включён</label><button id="saveSettings" class="primary">Сохранить</button><p class="hint">Секреты провайдеров задаются только через Supabase Secrets.</p><p id="settingsMessage"></p></div></div>
</section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></body></html>
